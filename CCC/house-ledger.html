<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#e8f0f4;--card:#fff;--border:#d0dbe4;--t1:#1a2a3a;--t2:#4a5a6a;--t3:#8a9aaa;--accent:#0d7377;--accentDk:#095456;--accentLt:#e0f4f4;--accent2:#e94560;--accent2Dk:#b8354d;--accent2Lt:#fce8ec;--rose:#e94560;--roseLt:#fce8ec;--lav:#7c3aed;--lavLt:#ede9fe;--amber:#d97706;--amberLt:#fef3c7;--sky:#0284c7;--skyLt:#e0f2fe;--headerGrad:linear-gradient(135deg,#0d7377 0%,#14919b 100%);--tabActive:#0d7377;--scrollThumb:#0d7377}
html{font-size:16px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;padding-bottom:80px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--scrollThumb);border-radius:3px}
h1,h2,h3,.serif{font-family:'Playfair Display',serif}
.header{background:var(--headerGrad);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header h1{font-size:1.2rem;letter-spacing:.5px}
.header-r{display:flex;gap:8px;align-items:center}
.header-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sync-dot{width:8px;height:8px;border-radius:50%;margin-right:6px}
.sync-live{background:#4ade80;animation:pulse 2s infinite}
.sync-err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Hero Cards */
.hero-row{display:flex;gap:12px;padding:12px 12px 4px;overflow-x:auto;scroll-snap-type:x mandatory}
.hero-card{flex:0 0 calc(50% - 6px);scroll-snap-align:start;background:var(--card);border-radius:20px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .3s ease;min-width:0}
.hero-card.expanded{flex:0 0 100%;position:relative}
.hero-front{padding:16px 14px}
.hero-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);font-weight:700;margin-bottom:6px}
.hero-big{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;line-height:1.15;color:var(--t1);word-break:break-word;overflow-wrap:anywhere}
.hero-sub{font-size:.72rem;color:var(--t2);margin-top:4px;font-weight:600}
.hero-expand{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;padding:0 14px}
.hero-card.expanded .hero-expand{max-height:500px;padding:0 14px 16px}
.hero-chevron{text-align:center;font-size:.7rem;color:var(--t3);padding:2px 0 6px;transition:transform .3s}
.hero-card.expanded .hero-chevron{transform:rotate(180deg)}
.split-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:8px 0 4px;gap:2px}
.split-seg{border-radius:3px;transition:flex .3s}
.budget-bar-wrap{margin:8px 0}
.budget-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;position:relative}
.budget-fill{height:100%;border-radius:4px;transition:width .5s}
.budget-labels{display:flex;justify-content:space-between;font-size:.65rem;color:var(--t3);margin-top:3px;font-weight:600}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.78rem}
.detail-row .label{color:var(--t2)}
.detail-row .value{font-weight:700;color:var(--t1)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}

/* Tab Bar */
.tab-bar{display:flex;background:var(--card);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:40;padding:4px 0 env(safe-area-inset-bottom,4px)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-size:.6rem;font-weight:700;color:var(--t3);cursor:pointer;border:none;background:none;transition:color .2s}
.tab-item.active{color:var(--tabActive)}
.tab-icon{font-size:1.15rem}

/* Entry List */
.entry-list{padding:8px 12px}
.search-bar{display:flex;gap:8px;margin-bottom:8px}
.search-bar input{flex:1;padding:10px 14px;border-radius:14px;border:1px solid var(--border);background:var(--card);font-size:.85rem;color:var(--t1);font-family:'Nunito',sans-serif}
.filter-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:var(--accentLt);color:var(--accent);font-size:.7rem;font-weight:700;margin-bottom:8px;cursor:pointer}
.subtotal-bar{background:var(--accentLt);border-radius:14px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.subtotal-bar .crumb{font-size:.72rem;color:var(--accent);font-weight:600}
.subtotal-bar .amt{font-family:'Playfair Display',serif;font-weight:700;color:var(--accent);font-size:1rem}

.entry-row{background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;position:relative;touch-action:pan-y}
.entry-content{padding:12px 14px;position:relative;z-index:2;background:var(--card);transition:transform .15s}
.entry-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.entry-vendor{font-weight:700;font-size:.88rem;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-amt{font-family:'Playfair Display',serif;font-weight:700;font-size:1rem;color:var(--t1);white-space:nowrap;flex-shrink:0}
.entry-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.entry-date{font-size:.7rem;color:var(--t3)}
.chip{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:.62rem;font-weight:700;white-space:nowrap}
.entry-detail{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s}
.entry-detail.open{max-height:400px;padding:8px 14px 14px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.detail-cell{font-size:.72rem}
.detail-cell .lbl{color:var(--t3);font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.detail-cell .val{color:var(--t1);font-weight:600;margin-top:1px}
.swipe-hint{text-align:center;font-size:.62rem;color:var(--t3);padding:4px 0 8px;font-style:italic}

/* Underlay for swipe */
.swipe-underlay{position:absolute;top:0;bottom:0;display:flex;align-items:center;padding:0 20px;font-weight:700;font-size:.8rem;color:#fff;z-index:1}
.swipe-underlay.left{right:0;background:#ef4444;border-radius:0 16px 16px 0}
.swipe-underlay.right{left:0;background:#3b82f6;border-radius:16px 0 0 16px}

/* Phase/Zone Tab Cards */
.overview-card{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;transition:transform .15s}
.overview-card:active{transform:scale(.98)}
.ov-header{display:flex;justify-content:space-between;align-items:flex-start}
.ov-title{font-family:'Playfair Display',serif;font-weight:700;font-size:1.05rem;color:var(--t1)}
.ov-amount{font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;color:var(--t1);white-space:nowrap}
.ov-meta{font-size:.7rem;color:var(--t3);margin-top:4px;font-weight:600}
.ov-mini-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;margin-top:8px;gap:1px}
.ov-mini-seg{border-radius:2px}
.back-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:12px;background:var(--accentLt);color:var(--accent);font-size:.75rem;font-weight:700;border:none;cursor:pointer;margin-bottom:10px}

/* Vendor Tab */
.vendor-card{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;transition:transform .15s}
.vendor-card:active{transform:scale(.98)}
.v-header{display:flex;justify-content:space-between;align-items:flex-start}
.v-name{font-weight:700;font-size:.92rem;color:var(--t1);flex:1;min-width:0}
.v-total{font-family:'Playfair Display',serif;font-weight:700;font-size:1.05rem;color:var(--t1);white-space:nowrap;flex-shrink:0}
.v-meta{font-size:.7rem;color:var(--t3);margin-top:4px;font-weight:600}
.v-intermediary{font-size:.65rem;color:var(--lav);margin-top:4px;font-weight:600}
.v-modes{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}

/* Timeline */
.tl-chart{padding:12px;background:var(--card);border-radius:18px;border:1px solid var(--border);margin-bottom:10px}
.tl-bars{display:flex;align-items:flex-end;gap:4px;height:180px;padding:0 4px}
.tl-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.tl-bar{width:100%;border-radius:4px 4px 0 0;cursor:pointer;transition:opacity .2s;min-height:2px}
.tl-bar:hover{opacity:.8}
.tl-month{font-size:.5rem;color:var(--t3);font-weight:700;transform:rotate(-45deg);white-space:nowrap;margin-top:4px}
.tl-toggle{display:flex;gap:6px;justify-content:center;margin-bottom:10px}
.tl-toggle button{padding:6px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-size:.72rem;font-weight:700;color:var(--t2);cursor:pointer;font-family:'Nunito',sans-serif}
.tl-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* FAB */
.fab{position:fixed;bottom:70px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:35;display:flex;align-items:center;justify-content:center}

/* Entry Form Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 16px env(safe-area-inset-bottom,16px)}
.modal h2{font-size:1.1rem;margin-bottom:14px;color:var(--t1)}
.form-steps{display:flex;gap:6px;margin-bottom:16px}
.form-step{flex:1;height:4px;border-radius:2px;background:var(--border)}
.form-step.active{background:var(--accent)}
.form-step.done{background:var(--accent);opacity:.5}
.field{margin-bottom:12px}
.field label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);font-size:.88rem;color:var(--t1);font-family:'Nunito',sans-serif}
.field textarea{resize:vertical;min-height:60px}
.toggle-group{display:flex;gap:6px}
.toggle-btn{flex:1;padding:8px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-size:.78rem;font-weight:600;cursor:pointer;text-align:center;color:var(--t2);font-family:'Nunito',sans-serif;transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.form-actions{display:flex;gap:8px;margin-top:16px}
.form-actions button{flex:1;padding:12px;border-radius:14px;border:none;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--border);color:var(--t2)}
.btn-danger{background:#ef4444;color:#fff}

/* Confirm Dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:70;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--card);border-radius:20px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-box h3{margin-bottom:8px;font-size:1rem}
.confirm-box p{font-size:.85rem;color:var(--t2);margin-bottom:16px}

/* Theme Picker */
.theme-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;display:flex;align-items:center;justify-content:center}
.theme-picker{background:var(--card);border-radius:24px;padding:24px;max-width:300px;width:90%}
.theme-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
.theme-opt{padding:14px 8px;border-radius:14px;border:2px solid var(--border);text-align:center;cursor:pointer;font-size:.75rem;font-weight:700;transition:all .2s}
.theme-opt.active{border-color:var(--accent);background:var(--accentLt)}
.theme-emoji{font-size:1.4rem;display:block;margin-bottom:4px}

/* User Menu */
.user-menu{position:absolute;top:100%;right:8px;background:var(--card);border-radius:14px;border:1px solid var(--border);padding:6px;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:55}
.user-opt{padding:8px 12px;border-radius:10px;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--t1)}
.user-opt:hover,.user-opt.active{background:var(--accentLt);color:var(--accent)}

.empty-state{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-state .icon{font-size:2.5rem;margin-bottom:8px}
.empty-state p{font-size:.85rem}
</style>
</head>
